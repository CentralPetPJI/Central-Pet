services:
  front:
    build:
      context: .
      dockerfile: central-pet-front/Dockerfile
    ports:
      - "${FRONT_PORT:-8080}:80"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/log/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 256m
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

