services:
  front:
    image: node:24.12.0-alpine
    working_dir: /app
    environment:
      VITE_AUTH_STRATEGY: jwt
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    depends_on:
      back:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/central-pet-front/node_modules
      - /app/central-pet-back/node_modules
    command: >
      sh -c "
      corepack enable &&
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 HUSKY=0 pnpm install --frozen-lockfile --ignore-scripts &&
      pnpm --filter central-pet-front dev --host 0.0.0.0 --port 5173
      "

  back:
    image: node:24.12.0-alpine
    working_dir: /app
    environment:
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      DATABASE_URL: postgresql://centralpet:centralpet123@postgres:5432/centralpetdb
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 60
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/central-pet-front/node_modules
      - /app/central-pet-back/node_modules
    command: >
      sh -c "
      corepack enable &&
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 HUSKY=0 pnpm install --frozen-lockfile --ignore-scripts &&
      pnpm --filter central-pet-back exec prisma generate &&
      pnpm --filter central-pet-back exec prisma migrate deploy &&
      pnpm --filter central-pet-back dev
      "
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: docker.io/postgres:17-alpine
    environment:
      POSTGRES_DB: centralpetdb
      POSTGRES_USER: centralpet
      POSTGRES_PASSWORD: centralpet123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centralpet -d centralpetdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
