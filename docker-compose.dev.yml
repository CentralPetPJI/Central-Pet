services:
  front:
    image: node:24.12.0-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/central-pet-front/node_modules
      - /app/central-pet-back/node_modules
    command: >
      sh -c "corepack enable
      && pnpm install --frozen-lockfile
      && pnpm --filter central-pet-front dev --host 0.0.0.0 --port 5173"
  back:
    image: node:24.12.0-alpine
    working_dir: /app
    env_file:
      - ./central-pet-back/.env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - .:/app
      - /app/node_modules
      - /app/central-pet-front/node_modules
      - /app/central-pet-back/node_modules
    command: >
      sh -c "corepack enable
      && pnpm install --frozen-lockfile
      && pnpm --filter central-pet-back exec prisma generate
      && pnpm --filter central-pet-back start:dev"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: centralpetdb
      POSTGRES_USER: centralpet
      POSTGRES_PASSWORD: centralpet123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
