---
name: "❓ Dúvida / Pergunta / Discussão"
about: Tire uma dúvida, pergunte algo ou inicie uma discussão sobre o projeto
title: "[DÚVIDA]"
labels: discussão, pergunta
assignees: ''


body:
  - type: markdown
    attributes:
      value: |
        Obrigado por abrir uma dúvida/pergunta!  
        Preencha os campos abaixo com o máximo de detalhes possível para recebermos respostas mais rápidas e precisas.  
        🚀 Dúvidas bem descritas costumam ser respondidas em poucas horas!

  - type: textarea
    id: contexto
    attributes:
      label: Qual é o contexto / o que você está tentando fazer?
      description: Conte um pouco da sua história. O que você quer alcançar? Qual parte do projeto está usando?
      placeholder: |
        Exemplo: Estou tentando criar um relatório customizado no dashboard, mas não estou conseguindo filtrar por data...
    validations:
      required: true

  - type: textarea
    id: o-que-ja-tentou
    attributes:
      label: O que você já tentou fazer?
      description: Liste os passos, códigos, configurações ou documentação que você já consultou.
      placeholder: |
        • Li a seção X.Y da documentação
        • Tentei usar a função exemplo() com esses parâmetros: ...
        • Recebi o erro: "Invalid token"
        • Pesquisei no Google por "..."
    validations:
      required: true

  - type: textarea
    id: codigo-exemplo
    attributes:
      label: Código / Configuração mínima reproduzível (se aplicável)
      description: Coloque o trecho de código mais simples possível que demonstra sua dúvida.
      render: bash    # ou mude para python, javascript, yaml, etc conforme o projeto
      placeholder: |
        # Exemplo mínimo
        const config = {
          apiKey: "xxxx",
          timeout: 5000
        };

        await fetchData(config);
    validations:
      required: false

  - type: textarea
    id: resultado-esperado
    attributes:
      label: Qual resultado você esperava?
      placeholder: |
        Esperava ver a lista ordenada por data decrescente
    validations:
      required: false

  - type: textarea
    id: resultado-atual
    attributes:
      label: Qual resultado está obtendo atualmente?
      placeholder: |
        A lista aparece ordenada por nome
    validations:
      required: false

  - type: input
    id: versao
    attributes:
      label: Versão do projeto / biblioteca / dependência
      description: Qual versão você está usando? (package.json, requirements.txt, tag do release, etc)
      placeholder: v2.1.3 / commit abc1234 / branch develop
    validations:
      required: false

  - type: dropdown
    id: ambiente
    attributes:
      label: Em qual ambiente você está rodando?
      options:
        - Local (minha máquina)
        - Docker / Podman
        - GitHub Actions / CI
        - Produção / Staging
        - Outro (descreva abaixo)
      default: 0
    validations:
      required: false

  - type: textarea
    id: ambiente-detalhes
    attributes:
      label: Detalhes do ambiente (se aplicável)
      description: SO, navegador, versão do Node/Python/Ruby/etc, variáveis de ambiente importantes...
      placeholder: |
        • Windows 11 / macOS Ventura / Ubuntu 22.04
        • Node v18.12.1
        • Chrome 120
    validations:
      required: false

  - type: checkboxes
    id: termos
    attributes:
      label: Confirmações finais
      description: Marque para confirmar que leu as orientações
      options:
        - label: Li a documentação e não encontrei resposta para minha dúvida
          required: true
        - label: Minha pergunta não é um bug nem uma sugestão de funcionalidade (para isso existem outros templates)
          required: true
        - label: Concordo em seguir o Código de Conduta do projeto
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        **Obrigado pela contribuição!**  
        Alguém da comunidade ou mantenedor vai te responder em breve. 🚀
---


